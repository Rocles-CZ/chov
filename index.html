<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Evidence chovu</title>
<link rel="apple-touch-icon" href="https://rocles-cz.github.io/chov/favicon.png">
<link rel="icon" type="image/png" href="https://rocles-cz.github.io/chov/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
:root {
  --bg: #f7f5f0; --surface: #ffffff; --surface2: #f0ede6; --border: #e2ddd4; --border2: #ccc8be;
  --text: #1a1814; --text2: #6b6760; --text3: #9e9b95; --accent: #3d6b4f; --accent-light: #e8f0eb;
  --radius: 10px; --radius-lg: 16px; --shadow: 0 1px 3px rgba(0,0,0,0.07);
  --boy: #eef4fb; --boy-text: #2e5a88; --girl: #fdf2f8; --girl-text: #a64d79; --danger: #c62828;
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #16140f; --surface: #1f1d18; --surface2: #2a2820; --border: #353228; --text: #f0ede6; --text2: #a09d96; }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 16px; max-width: 860px; margin: 0 auto; }
header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.btn { padding: 10px 18px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--surface); cursor: pointer; font-weight: 600; }
.btn-primary { background: var(--accent); color: white; border: none; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow); cursor: pointer; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
.modal { background: var(--surface); width: 100%; max-width: 500px; border-radius: var(--radius-lg); padding: 25px; }
input, select, textarea { padding: 12px; border-radius: var(--radius); border: 1px solid var(--border2); width: 100%; margin-bottom: 10px; }
</style>
</head>
<body>

<header>
  <h1>Evidence chovu</h1>
  <button class="btn btn-primary" onclick="saveToGithub()">💾 ULOŽIT NA GITHUB</button>
</header>

<div id="dog-grid" class="grid"></div>
<button class="btn" onclick="openDogModal()" style="margin-top:20px">+ Přidat psa</button>

<div id="dog-overlay" class="overlay">
  <div class="modal">
    <form onsubmit="saveDog(event)">
      <input id="d-name" placeholder="Jméno" required>
      <select id="d-gender"><option value="M">Pes</option><option value="F">Fena</option></select>
      <input type="date" id="d-born">
      <button type="submit" class="btn btn-primary">Uložit do seznamu</button>
      <button type="button" class="btn" onclick="closeOverlay()">Zrušit</button>
    </form>
  </div>
</div>

<script>
let db = { dogs: [], puppies: [] };
let _editId = null;

const gh = { owner: 'rocles-cz', repo: 'chov', path: 'index.html' };

function render() {
  const dg = document.getElementById('dog-grid'); dg.innerHTML = '';
  db.dogs.forEach(d => {
    const div = document.createElement('div'); div.className = 'card';
    div.innerHTML = `<h3>${d.name}</h3><p>${d.gender === 'M' ? 'Pes' : 'Fena'} (${d.born})</p>`;
    div.onclick = () => { _editId = d.id; document.getElementById('d-name').value = d.name; document.getElementById('dog-overlay').style.display='flex'; };
    dg.appendChild(div);
  });
}

function openDogModal() { _editId = null; document.getElementById('d-name').value=''; document.getElementById('dog-overlay').style.display='flex'; }
function closeOverlay() { document.getElementById('dog-overlay').style.display='none'; }

function saveDog(e) {
  e.preventDefault();
  const d = { id: _editId || Date.now(), name: document.getElementById('d-name').value, gender: document.getElementById('d-gender').value, born: document.getElementById('d-born').value };
  if(_editId) db.dogs = db.dogs.map(x => x.id === _editId ? d : x); else db.dogs.push(d);
  closeOverlay(); render();
}

async function saveToGithub() {
  let token = localStorage.getItem('gh_token');
  if (!token) {
    token = prompt("Vlož svůj GitHub Personal Access Token:");
    if (token) localStorage.setItem('gh_token', token); else return;
  }

  const currentDbString = JSON.stringify(db);
  let html = document.documentElement.outerHTML;
  html = "<!DOCTYPE html>\n" + html.replace(/let db\s*=\s*\{[\s\S]*?\};/, `let db = ${currentDbString};`);

  try {
    const res = await fetch(`https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/${gh.path}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    const file = await res.json();
    
    const update = await fetch(`https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/${gh.path}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: "Update data",
        content: btoa(unescape(encodeURIComponent(html))),
        sha: file.sha
      })
    });

    if (update.ok) alert("Hotovo! Zapsáno na GitHub.");
    else alert("Chyba při zápisu. Zkontroluj token.");
  } catch (e) { alert("Chyba spojení."); }
}

render();
</script>
</body>
</html>
