<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Evidence chovu / Élevage</title>
<link rel="apple-touch-icon" href="https://rocles-cz.github.io/chov/favicon.png">
<link rel="icon" type="image/png" href="https://rocles-cz.github.io/chov/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
:root {
  --bg: #f7f5f0; --surface: #ffffff; --surface2: #f0ede6; --border: #e2ddd4; --border2: #ccc8be;
  --text: #1a1814; --text2: #6b6760; --text3: #9e9b95; --accent: #3d6b4f; --accent-light: #e8f0eb;
  --radius: 10px; --radius-lg: 16px; --shadow: 0 1px 3px rgba(0,0,0,0.07);
  --boy: #eef4fb; --boy-text: #2e5a88; --girl: #fdf2f8; --girl-text: #a64d79; --danger: #c62828;
  --unpaid: #d00000;
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #16140f; --surface: #1f1d18; --surface2: #2a2820; --border: #353228; --text: #f0ede6; --text2: #a09d96; 
          --boy: #1a2a3a; --girl: #2d1b24; }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 0 16px 60px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
h1, h2, h3 { font-family: 'DM Serif Display', serif; font-weight: 400; letter-spacing: -0.02em; }
.app { max-width: 860px; margin: 0 auto; }
header { padding: 32px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center; gap: 16px; position: relative; }
.logo { display: flex; align-items: center; gap: 15px; }
.logo-icon { width: 55px; height: 55px; background: var(--accent); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; cursor: pointer; overflow: hidden; border: 2px solid var(--border); flex-shrink: 0; transition: transform 0.2s; }
.logo-icon img { width: 100%; height: 100%; object-fit: cover; }
h1 { font-size: 28px; color: var(--accent); line-height: 1.1; }
.controls { display: flex; align-items: center; gap: 12px; }
.btn { padding: 10px 18px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--surface); color: var(--text); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; white-space: nowrap; }
.btn-primary { background: var(--accent); color: white; border: none; box-shadow: 0 2px 4px rgba(61,107,79,0.2); }
.lang-switcher { display: flex; border: 1px solid var(--border2); border-radius: var(--radius); overflow: hidden; background: var(--surface); height: 38px; }
.lang-btn { padding: 0 14px; border: none; background: transparent; cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text2); }
.lang-btn.active { background: var(--accent); color: white; }
.section-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; padding: 0 4px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 48px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; position: relative; box-shadow: var(--shadow); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.card-title { font-size: 20px; font-weight: 400; color: var(--text); }
.gender-tag { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; }
.gender-M { background: var(--boy); color: var(--boy-text); }
.gender-F { background: var(--girl); color: var(--girl-text); }
.card-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.meta-label { font-size: 11px; color: var(--text3); text-transform: uppercase; font-weight: 600; }
.meta-value { font-size: 14px; color: var(--text); font-weight: 500; }
.overlay { position: fixed; inset: 0; background: rgba(22,20,15,0.8); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 16px; }
.modal { background: var(--surface); width: 100%; max-width: 500px; border-radius: var(--radius-lg); padding: 28px; position: relative; max-height: 90vh; overflow-y: auto; }
.modal-close { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; color: var(--text3); }
form { display: grid; gap: 18px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
input, select, textarea { padding: 12px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--surface); font-family: inherit; font-size: 15px; color: var(--text); }
.pup-list { list-style: none; display: grid; gap: 12px; }
.pup-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; align-items: center; gap: 16px; }
.pup-color { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.pup-info { flex-grow: 1; }
.pup-status { font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 2px 8px; border-radius: 10px; }
.status-free { background: var(--accent-light); color: var(--accent); }
.status-reserved { background: var(--surface2); color: var(--text2); }
.status-sold { background: #eee; color: #999; }
.status-unpaid { background: #fff5f5; color: var(--unpaid); border: 1px solid #fed7d7; }
.drag-handle { color: var(--border2); cursor: grab; padding: 4px; }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon" onclick="document.getElementById('file-import').click()">
        <img id="logo-img" src="https://rocles-cz.github.io/chov/favicon.png" alt="🐕" onerror="this.style.display='none'">
      </div>
      <h1 id="title-main">Evidence chovu</h1>
    </div>
    <div class="controls">
      <button class="btn btn-primary" onclick="exportData()">💾 Zálohovat</button>
      <div class="lang-switcher">
        <button class="lang-btn" id="btn-cz" onclick="setLang('cz')">CZ</button>
        <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>
      </div>
    </div>
  </header>

  <input type="file" id="file-import" style="display:none" onchange="importData(event)" accept=".html">

  <section>
    <div class="section-header">
      <h2 id="title-dogs">Dospělí psi <span class="count-badge" id="count-dogs">0</span></h2>
      <button class="btn btn-primary" onclick="openDogModal()" id="btn-add-dog">+ Přidat</button>
    </div>
    <div id="dog-grid" class="grid"></div>
  </section>

  <section>
    <div class="section-header">
      <h2 id="title-pups">Štěňata <span class="count-badge" id="count-pups">0</span></h2>
      <button class="btn btn-primary" onclick="openPupModal()" id="btn-add-pup">+ Přidat</button>
    </div>
    <ul id="pup-list" class="pup-list"></ul>
  </section>
</div>

<div id="dog-overlay" class="overlay">
  <div class="modal">
    <span class="modal-close" onclick="closeOverlay('dog-overlay')">&times;</span>
    <h2 id="modal-dog-title">Karta psa</h2>
    <form id="dog-form" onsubmit="saveDog(event)">
      <div class="form-group"><label id="l-name">Jméno</label><input id="d-name" required></div>
      <div class="form-group"><label id="l-gender">Pohlaví</label><select id="d-gender"><option value="M">Pes</option><option value="F">Fena</option></select></div>
      <div class="form-group"><label id="l-born">Narození</label><input type="date" id="d-born"></div>
      <div class="form-group"><label id="l-chip">Čip / Tetování</label><input id="d-chip"></div>
      <div class="form-group"><label id="l-note">Poznámka</label><textarea id="d-note" rows="3"></textarea></div>
      <div style="display:flex; gap:10px">
        <button type="submit" class="btn btn-primary" style="flex:1" id="btn-save">Uložit</button>
        <button type="button" class="btn" onclick="deleteDog()" id="btn-del" style="color:var(--danger)">Smazat</button>
      </div>
    </form>
  </div>
</div>

<div id="pup-overlay" class="overlay">
  <div class="modal">
    <span class="modal-close" onclick="closeOverlay('pup-overlay')">&times;</span>
    <h2 id="modal-pup-title">Detail štěněte</h2>
    <form id="pup-form" onsubmit="savePup(event)">
      <div class="form-group"><label id="lp-name">Jméno / Stužka</label><input id="p-name" required></div>
      <div class="form-group"><label id="lp-gender">Pohlaví</label><select id="p-gender"><option value="M">Pes</option><option value="F">Fena</option></select></div>
      <div class="form-group"><label id="lp-color">Barva stužky</label><input type="color" id="p-color"></div>
      <div class="form-group"><label id="lp-status">Stav</label><select id="p-status"><option value="free">Volný</option><option value="reserved">Rezervace</option><option value="sold">V domově</option><option value="unpaid">NEZAPLACENO</option></select></div>
      <div class="form-group"><label id="lp-note">Majitel / Poznámka</label><textarea id="p-note" rows="3"></textarea></div>
      <div style="display:flex; gap:10px">
        <button type="submit" class="btn btn-primary" style="flex:1" id="btn-save-p">Uložit</button>
        <button type="button" class="btn" onclick="deletePup()" id="btn-del-p" style="color:var(--danger)">Smazat</button>
      </div>
    </form>
  </div>
</div>

<script>
let db = { lang: 'cz', dogs: [], puppies: [] };

const translations = {
  cz: { title: "Evidence chovu", dogs: "Dospělí psi", pups: "Štěňata", add: "+ Přidat", btn_save: "Uložit", confirm_del: "Opravdu smazat?", gender: { M: "Pes", F: "Fena" }, status: { free: "Volný", reserved: "Rezervace", sold: "V domově", unpaid: "NEZAPLACENO" } },
  fr: { title: "Élevage", dogs: "Chiens adultes", pups: "Chiots", add: "+ Ajouter", btn_save: "Enregistrer", confirm_del: "Supprimer?", gender: { M: "Mâle", F: "Femelle" }, status: { free: "Libre", reserved: "Réservé", sold: "Chez proprio", unpaid: "IMPAYÉ" } }
};

let _eDog = null; let _ePup = null;

function setLang(l) {
  db.lang = l; const t = translations[l];
  document.getElementById('title-main').innerText = t.title;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + l).classList.add('active');
  render();
}

function render() {
  const t = translations[db.lang];
  const dogGrid = document.getElementById('dog-grid'); dogGrid.innerHTML = '';
  db.dogs.forEach(d => {
    const card = document.createElement('div'); card.className = 'card'; card.onclick = () => openDogModal(d.id);
    card.innerHTML = `<div class="card-header"><div class="card-title">${d.name}</div><span class="gender-tag gender-${d.gender}">${t.gender[d.gender]}</span></div><div class="card-meta"><div><span class="meta-label">Narození</span><div class="meta-value">${d.born || '—'}</div></div><div><span class="meta-label">Čip</span><div class="meta-value">${d.chip || '—'}</div></div></div>`;
    dogGrid.appendChild(card);
  });
  const pupList = document.getElementById('pup-list'); pupList.innerHTML = '';
  db.puppies.forEach(p => {
    const li = document.createElement('li'); li.className = 'pup-item'; li.onclick = () => openPupModal(p.id);
    li.innerHTML = `<div class="drag-handle">⠿</div><div class="pup-color" style="background:${p.color}"></div><div class="pup-info"><div style="font-weight:600">${p.name}</div><div style="font-size:13px;color:var(--text2)">${p.note || ''}</div></div><span class="pup-status status-${p.status}">${t.status[p.status]}</span>`;
    pupList.appendChild(li);
  });
  document.getElementById('count-dogs').innerText = db.dogs.length;
  document.getElementById('count-pups').innerText = db.puppies.length;
}

function openDogModal(id = null) { _eDog = id; const d = db.dogs.find(x => x.id === id) || { name: '', gender: 'F', born: '', chip: '', note: '' }; document.getElementById('d-name').value = d.name; document.getElementById('d-gender').value = d.gender; document.getElementById('d-born').value = d.born; document.getElementById('d-chip').value = d.chip; document.getElementById('d-note').value = d.note; document.getElementById('dog-overlay').style.display = 'flex'; }
function openPupModal(id = null) { _ePup = id; const p = db.puppies.find(x => x.id === id) || { name: '', gender: 'F', color: '#3d6b4f', status: 'free', note: '' }; document.getElementById('p-name').value = p.name; document.getElementById('p-gender').value = p.gender; document.getElementById('p-color').value = p.color; document.getElementById('p-status').value = p.status; document.getElementById('p-note').value = p.note; document.getElementById('pup-overlay').style.display = 'flex'; }
function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }

function saveDog(e) { e.preventDefault(); const data = { id: _eDog || Date.now(), name: document.getElementById('d-name').value, gender: document.getElementById('d-gender').value, born: document.getElementById('d-born').value, chip: document.getElementById('d-chip').value, note: document.getElementById('d-note').value }; if (_eDog) db.dogs = db.dogs.map(x => x.id === _eDog ? data : x); else db.dogs.push(data); closeOverlay('dog-overlay'); render(); }
function savePup(e) { e.preventDefault(); const data = { id: _ePup || Date.now(), name: document.getElementById('p-name').value, gender: document.getElementById('p-gender').value, color: document.getElementById('p-color').value, status: document.getElementById('p-status').value, note: document.getElementById('p-note').value }; if (_ePup) db.puppies = db.puppies.map(x => x.id === _ePup ? data : x); else db.puppies.push(data); closeOverlay('pup-overlay'); render(); }
function deleteDog() { if(confirm(translations[db.lang].confirm_del)){db.dogs=db.dogs.filter(x=>x.id!==_eDog); closeOverlay('dog-overlay'); render();}}
function deletePup() { if(confirm(translations[db.lang].confirm_del)){db.puppies=db.puppies.filter(x=>x.id!==_ePup); closeOverlay('pup-overlay'); render();}}

// PŮVODNÍ FUNKCE EXPORTU DO SOUBORU
function exportData() {
    const currentDbString = JSON.stringify(db);
    let htmlContent = document.documentElement.outerHTML;
    htmlContent = htmlContent.replace(/let db\s*=\s*\{[\s\S]*?\};/, `let db = ${currentDbString};`);
    const blob = new Blob([htmlContent], { type: "text/html" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "index.html";
    a.click();
}

function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        const content = ev.target.result;
        const match = content.match(/let db\s*=\s*(\{[\s\S]*?\});/);
        if (match && match[1]) {
            db = JSON.parse(match[1]);
            setLang(db.lang || 'cz');
        }
    };
    reader.readAsText(file);
}

new Sortable(document.getElementById('pup-list'), { animation: 150, handle: '.drag-handle' });
setLang(db.lang);
</script>
</body>
</html>
