<!DOCTYPE html>
<html lang="cs"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Evidence chovu / Élevage</title>
<link rel="apple-touch-icon" href="https://rocles-cz.github.io/chov/favicon.png">
<link rel="icon" type="image/png" href="https://rocles-cz.github.io/chov/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&amp;family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
:root {
  --bg: #f7f5f0; --surface: #ffffff; --surface2: #f0ede6; --border: #e2ddd4; --border2: #ccc8be;
  --text: #1a1814; --text2: #6b6760; --text3: #9e9b95; --accent: #3d6b4f; --accent-light: #e8f0eb;
  --radius: 10px; --radius-lg: 16px; --shadow: 0 1px 3px rgba(0,0,0,0.07);
  --boy: #eef4fb; --boy-text: #2e5a88; --girl: #fdf2f8; --girl-text: #a64d79; --danger: #c62828;
  --unpaid: #d00000;
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #16140f; --surface: #1f1d18; --surface2: #2a2820; --border: #353228; --text: #f0ede6; --text2: #a09d96; 
          --boy: #1a2a3a; --girl: #2d1b24; }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 0 16px 60px; }
h1, h2, h3 { font-family: 'DM Serif Display', serif; }
.app { max-width: 860px; margin: 0 auto; }
.save-controls { display: flex; gap: 10px; padding: 12px; background: #fff8e1; border: 2px solid #ffca28; border-radius: var(--radius); margin: 20px 0; align-items: center; }
header { padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.logo { display: flex; align-items: center; gap: 15px; min-width: 150px; }
.logo-icon { width: 55px; height: 55px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; cursor: pointer; overflow: hidden; border: 2px solid var(--border); flex-shrink: 0; }
.logo-icon img { width: 100%; height: 100%; object-fit: cover; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.stat-val { font-weight: 700; font-size: 1.2em; display: inline-block; margin-right: 5px; }
.stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
.tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface2); border-radius: var(--radius); padding: 4px; border: 1px solid var(--border); }
.tab { flex: 1; padding: 8px; font-size: 13px; font-weight: 500; border: none; background: none; color: var(--text2); border-radius: 8px; cursor: pointer; }
.tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
.section { display: none; } .section.active { display: block; }
.dog-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 16px; overflow: hidden; position: relative; }
.dog-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.dog-header.male { background: var(--boy); }
.dog-header.female { background: var(--girl); }
.repro-info { background: #fff9c4; padding: 8px 20px; font-size: 12px; border-bottom: 1px solid var(--border); color: #5d4037; font-weight: 600; }
.avatar-col { width: 50px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: 12px; }
.sq-avatar { width: 45px; height: 45px; border-radius: 12px; background: var(--surface2); border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 22px; overflow: hidden; }
.sq-avatar img { width: 100%; height: 100%; object-fit: cover; }
.pup-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
.pup-row.male { background: var(--boy); }
.pup-row.female { background: var(--girl); }
.drag-handle-col { width: 24px; color: var(--text3); cursor: grab; }
.sex-badge { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; font-size: 11px; font-weight: bold; color: white; margin-left: 5px; }
.sex-badge.m { background: #2196F3; }
.sex-badge.f { background: #E91E63; }
.price-container { text-align: right; min-width: 125px; }
.price-ratio { font-size: 12px; font-weight: 700; }
.progress-bar-bg { width: 100%; height: 5px; background: var(--border2); border-radius: 3px; margin: 5px 0; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--accent); }
.quick-attachments { display: flex; gap: 12px; margin-top: 10px; }
.att-group { display: flex; flex-direction: column; align-items: center; width: 60px; text-align: center; cursor: pointer; }
.att-name { font-size: 9px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }
.mini-photo-link { width: 38px; height: 38px; border-radius: 6px; border: 2px solid #fff; box-shadow: 0 0 0 1px var(--border); overflow: hidden; }
.mini-photo-link img { width: 100%; height: 100%; object-fit: cover; }
.btn { padding: 6px 12px; font-size: 13px; font-weight: 500; border: 1px solid var(--border2); border-radius: 8px; cursor: pointer; background: var(--surface); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; backdrop-filter: blur(2px); align-items: center; justify-content: center; padding: 10px; }
.overlay.open { display: flex; }
.modal { background: var(--surface); padding: 24px; border-radius: var(--radius-lg); width: 80%; max-width: 800px; max-height: 95vh; overflow-y: auto; position: relative; }
.modal-close { position: absolute; top: 15px; right: 15px; font-size: 28px; cursor: pointer; color: var(--text2); }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; }
.field input, .field select, .field textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-size: 16px; }
#viewer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; flex-direction: column; }
#viewer-overlay.open { display: flex; }
#viewer-content img { max-width: 90%; max-height: 80vh; border-radius: 8px; border: 2px solid #fff; }
.viewer-close-btn { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 8px; margin-top: 20px; cursor: pointer; font-weight: bold; }
#crop-overlay { z-index: 3000; }
.crop-box { background: var(--surface); padding: 20px; border-radius: 20px; width: 320px; text-align: center; }
.crop-canvas-wrap { position: relative; width: 280px; height: 280px; margin: 10px auto; background: #000; overflow: hidden; cursor: move; touch-action: none; border: 2px solid var(--accent); }
#crop-canvas { position: absolute; top: 0; left: 0; }
</style>
</head>
<body>
<div class="app">
  <div class="save-controls">
    <button class="btn btn-primary" onclick="exportData()">💾 Uložit data</button>
    <button class="btn" onclick="document.getElementById('importFile').click()">📂 Načíst zálohu</button>
    <div class="lang-switcher" style="margin-left:auto; display:flex; gap:5px;">
        <button class="btn" onclick="setLang('cz')">CZ</button>
        <button class="btn" onclick="setLang('fr')">FR</button>
    </div>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)">
  </div>
  <header>
    <div class="logo">
      <div class="logo-icon" id="main-logo" onclick="triggerLogoUpload()">🐕</div>
      <h1 data-lang="title">Evidence chovu</h1>
    </div>
    <button class="btn btn-primary" onclick="openDogModal()" data-lang="add_dog">+ Přidat dospělého</button>
  </header>
  <div class="stats" id="stats"><div class="stat"><span class="stat-val">0</span><span class="stat-label">Dospělí</span></div><div class="stat"><span class="stat-val">0</span><span class="stat-label">Štěňata</span></div></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('fenky', this)" data-lang="tab_dogs">Psi a štěňata</button>
    <button class="tab" onclick="switchTab('platby', this)" data-lang="tab_finance">Finance</button>
  </div>
  <div id="tab-fenky" class="section active"></div>
  <div id="tab-platby" class="section"></div>
</div>

<div class="overlay" id="dog-overlay"><div class="modal"><div class="modal-close" onclick="closeOverlay('dog-overlay')">×</div><h2 data-lang="modal_dog_title">Dospělý jedinec</h2><div style="display:flex; gap:15px; align-items:center; margin-bottom:15px;"><div class="sq-avatar" id="d-img-preview" style="width:70px;height:70px;cursor:pointer;border:2px dashed var(--accent);" onclick="triggerUpload('d')">🐶</div><div style="flex:1"><div class="field"><label data-lang="label_name">Jméno</label><input id="d-name"></div><div class="field"><label data-lang="label_sex">Pohlaví</label><select id="d-sex" onchange="toggleRepro()"><option value="pes">Pes ♂</option><option value="fenka">Fenka ♀</option></select></div></div></div><div class="field"><label data-lang="label_birth">Narození</label><input id="d-birth" type="date"></div><div id="repro-fields" style="display:none;"><div class="field"><label data-lang="label_heat">Poslední hárání</label><input id="d-heat" type="date"></div><div class="field"><label data-lang="label_mate">Datum krytí</label><input id="d-mate" type="date"></div></div><div class="field"><label data-lang="label_note">Poznámka</label><textarea id="d-note"></textarea></div><div style="display:flex; justify-content:space-between;"><button class="btn" style="color:red" onclick="deleteDog()">Smazat</button><button class="btn btn-primary" onclick="saveDog()">Uložit</button></div></div></div>
<div class="overlay" id="pup-overlay"><div class="modal"><div class="modal-close" onclick="closeOverlay('pup-overlay')">×</div><h2 data-lang="modal_pup_title">Štěně</h2><div style="display:flex; gap:15px; align-items:center; margin-bottom:15px;"><div class="sq-avatar" id="p-img-preview" style="width:70px;height:70px;cursor:pointer;border:2px dashed var(--accent);" onclick="triggerUpload('p')">🐾</div><div style="flex:1"><div class="field"><label data-lang="label_name">Jméno</label><input id="p-name"></div><div class="field"><label data-lang="label_sex">Pohlaví</label><select id="p-sex"><option value="pes">Pes ♂</option><option value="fenka">Fenka ♀</option></select></div></div></div><div class="field"><label data-lang="label_price">Cena (€)</label><input id="p-price" type="number"></div><div class="field"><label data-lang="label_status">Stav</label><select id="p-status"><option value="volné">Volné</option><option value="rezervace">Rezervace</option><option value="prodáno">Prodáno</option></select></div><div style="display:flex; justify-content:space-between;"><button class="btn" style="color:red" onclick="deletePup()">Smazat</button><button class="btn btn-primary" onclick="savePup()">Uložit</button></div></div></div>
<div class="overlay" id="crop-overlay"><div class="crop-box"><h3>Upravit výřez</h3><div class="crop-canvas-wrap" id="canvas-container"><canvas id="crop-canvas" width="280" height="280"></canvas></div><input type="range" id="zoom-slider" min="0.1" max="3" step="0.01" style="width:100%"><div style="display:flex; gap:10px; margin-top:10px;"><button class="btn" style="flex:1" onclick="closeOverlay('crop-overlay')">Zrušit</button><button class="btn btn-primary" style="flex:1" onclick="applyCrop()">Hotovo</button></div></div></div>
<div id="viewer-overlay" onclick="closeViewer()"><div id="viewer-content"></div><button class="viewer-close-btn">ZAVŘÍT ✕</button></div>

<input type="file" id="hidden-upload" style="display:none" onchange="handleImage(event)" accept="image/*">

<script>
// --- KONFIGURACE GITHUB ---
const GITHUB_CONFIG = {
    get token() { return localStorage.getItem('gh_token'); },
    get repo() { return localStorage.getItem('gh_repo'); },
    path: "index.html"
};

let db = {"dogs":[],"puppies":[],"payments":[],"logo":null,"lang":"cz"};

// --- FUNKCE PRO GITHUB ---
async function setupGitHub() {
    const t = prompt("Zadejte váš GitHub Personal Access Token:");
    const r = prompt("Zadejte cestu k repozitáři (např. rocles-cz/chov):");
    if (t && r) {
        localStorage.setItem('gh_token', t.trim());
        localStorage.setItem('gh_repo', r.trim());
        return true;
    }
    return false;
}

async function exportData() {
    if (!GITHUB_CONFIG.token || !GITHUB_CONFIG.repo) {
        if(!await setupGitHub()) return;
    }

    const currentDbString = JSON.stringify(db);
    let htmlContent = document.documentElement.outerHTML;
    htmlContent = htmlContent.replace(/overlay/g, 'overlay');
    htmlContent = htmlContent.replace(/let db\s*=\s*\{[\s\S]*?\};/, `let db = ${currentDbString};`);
    const fullContent = "<!DOCTYPE html>\n" + htmlContent;

    try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`, {
            headers: { "Authorization": `token ${GITHUB_CONFIG.token}` }
        });
        if (!res.ok) throw new Error("Nelze získat SHA souboru.");
        const fileData = await res.json();

        const updateRes = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`, {
            method: "PUT",
            headers: { "Authorization": `token ${GITHUB_CONFIG.token}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                message: "Update: " + new Date().toLocaleString(),
                content: btoa(unescape(encodeURIComponent(fullContent))),
                sha: fileData.sha
            })
        });

        if (updateRes.ok) {
            alert("✅ Uloženo na GitHub!");
        } else {
            alert("❌ Chyba při ukládání. Zkontrolujte Token.");
            localStorage.removeItem('gh_token');
        }
    } catch (err) {
        console.error(err);
        alert("⚠️ Selhalo online uložení. Stahuji soubor do PC.");
        const blob = new Blob([fullContent], { type: "text/html" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "zaloha_chov.html";
        a.click();
    }
}

// --- ZBYTEK LOGIKY (Ořez, Modály, Render) ---
const canvas = document.getElementById('crop-canvas');
const ctx = canvas.getContext('2d');
let cropImg = new Image(), _uploadTarget = null, _tempIcon = null;
let cropState = { x: 0, y: 0, scale: 1, dragging: false, lastX: 0, lastY: 0 };

function handleImage(e) {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
        cropImg = new Image();
        cropImg.onload = () => {
            cropState.scale = 280 / Math.min(cropImg.width, cropImg.height);
            cropState.x = (280 - cropImg.width * cropState.scale) / 2;
            cropState.y = (280 - cropImg.height * cropState.scale) / 2;
            drawCrop(); document.getElementById('crop-overlay').classList.add('open');
        };
        cropImg.src = ev.target.result;
    };
    r.readAsDataURL(file);
}

function drawCrop() {
    ctx.clearRect(0, 0, 280, 280);
    ctx.drawImage(cropImg, cropState.x, cropState.y, cropImg.width * cropState.scale, cropImg.height * cropState.scale);
}

document.getElementById('canvas-container').onmousedown = e => { cropState.dragging = true; cropState.lastX = e.clientX; cropState.lastY = e.clientY; };
window.onmousemove = e => { if (cropState.dragging) { cropState.x += (e.clientX - cropState.lastX); cropState.y += (e.clientY - cropState.lastY); cropState.lastX = e.clientX; cropState.lastY = e.clientY; drawCrop(); }};
window.onmouseup = () => { cropState.dragging = false; };

function applyCrop() {
    const tmp = document.createElement('canvas'); tmp.width = 150; tmp.height = 150;
    tmp.getContext('2d').drawImage(canvas, 0, 0, 280, 280, 0, 0, 150, 150);
    const res = tmp.toDataURL('image/jpeg', 0.8);
    if (_uploadTarget === 'logo') { db.logo = res; render(); }
    else { _tempIcon = res; document.getElementById(`${_uploadTarget}-img-preview`).innerHTML = `<img src="${res}" style="width:100%;height:100%;object-fit:cover">`; }
    closeOverlay('crop-overlay');
}

// Základní funkce pro zobrazení a ovládání
function render() {
    const t = db.lang === 'cz' ? { adults: "Dospělí", pups: "Štěňata" } : { adults: "Adultes", pups: "Chiots" };
    document.getElementById('main-logo').innerHTML = db.logo ? `<img src="${db.logo}" style="width:100%;height:100%;object-fit:cover">` : "🐕";
    document.getElementById('stats').innerHTML = `<div class="stat"><span class="stat-val">${db.dogs.length}</span><span class="stat-label">${t.adults}</span></div><div class="stat"><span class="stat-val">${db.puppies.length}</span><span class="stat-label">${t.pups}</span></div>`;
    
    document.getElementById('tab-fenky').innerHTML = db.dogs.map(d => `
        <div class="dog-card">
            <div class="dog-header ${d.sex==='pes'?'male':'female'}">
                <div style="display:flex; align-items:center; gap:10px; cursor:pointer" onclick="openDogModal('${d.id}')">
                    <div class="sq-avatar">${d.img ? `<img src="${d.img}" style="width:100%;height:100%;object-fit:cover">` : '🐶'}</div>
                    <strong>${d.name}</strong>
                </div>
                <button class="btn" onclick="openPupModal('${d.id}')">+ Štěně</button>
            </div>
            <div class="puppies-container">
                ${db.puppies.filter(p=>p.dogId===d.id).map(p=>`
                    <div class="pup-row ${p.sex==='pes'?'male':'female'}" onclick="openPupModal('${d.id}','${p.id}')">
                        <div class="sq-avatar" style="width:30px; height:30px; font-size:14px">${p.img ? `<img src="${p.img}" style="width:100%;height:100%;object-fit:cover">` : '🐾'}</div>
                        <div style="flex:1; margin-left:10px"><strong>${p.name||'---'}</strong></div>
                        <div class="price-ratio">${p.price} €</div>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
}

let _eDog = null, _ePup = null, _ePupDog = null;
function openDogModal(id=null) { _eDog=id; const d=db.dogs.find(x=>x.id===id); document.getElementById('d-name').value=d?.name||''; document.getElementById('d-sex').value=d?.sex||'fenka'; _tempIcon=d?.img||null; document.getElementById('d-img-preview').innerHTML=_tempIcon?`<img src="${_tempIcon}" style="width:100%;height:100%;object-fit:cover">`:'🐶'; toggleRepro(); document.getElementById('dog-overlay').classList.add('open'); }
function saveDog() { const d={id:_eDog||Date.now().toString(), name:document.getElementById('d-name').value, sex:document.getElementById('d-sex').value, img:_tempIcon}; if(_eDog) db.dogs=db.dogs.map(x=>x.id===_eDog?d:x); else db.dogs.push(d); closeOverlay('dog-overlay'); render(); }
function openPupModal(dId, pId=null) { _ePupDog=dId; _ePup=pId; const p=db.puppies.find(x=>x.id===pId); document.getElementById('p-name').value=p?.name||''; document.getElementById('p-price').value=p?.price||0; _tempIcon=p?.img||null; document.getElementById('p-img-preview').innerHTML=_tempIcon?`<img src="${_tempIcon}" style="width:100%;height:100%;object-fit:cover">`:'🐾'; document.getElementById('pup-overlay').classList.add('open'); }
function savePup() { const p={id:_ePup||Date.now().toString(), dogId:_ePupDog, name:document.getElementById('p-name').value, price:document.getElementById('p-price').value, img:_tempIcon}; if(_ePup) db.puppies=db.puppies.map(x=>x.id===_ePup?p:x); else db.puppies.push(p); closeOverlay('pup-overlay'); render(); }

function triggerUpload(t){_uploadTarget=t; document.getElementById('hidden-upload').click();}
function triggerLogoUpload(){_uploadTarget='logo'; document.getElementById('hidden-upload').click();}
function closeOverlay(id){document.getElementById(id).classList.remove('open');}
function setLang(l){db.lang=l; render();}
function toggleRepro(){document.getElementById('repro-fields').style.display=document.getElementById('d-sex').value==='fenka'?'block':'none';}
function switchTab(t,b){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active');}

render();
</script>


</body></html>
