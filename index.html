<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Evidence chovu / Élevage</title>
<link rel="apple-touch-icon" href="https://rocles-cz.github.io/chov/favicon.png">
<link rel="icon" type="image/png" href="https://rocles-cz.github.io/chov/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&amp;family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
:root {
  --bg: #f7f5f0; --surface: #ffffff; --surface2: #f0ede6; --border: #e2ddd4; --border2: #ccc8be;
  --text: #1a1814; --text2: #6b6760; --text3: #9e9b95; --accent: #3d6b4f; --accent-light: #e8f0eb;
  --radius: 10px; --radius-lg: 16px; --shadow: 0 1px 3px rgba(0,0,0,0.07);
  --boy: #eef4fb; --boy-text: #2e5a88; --girl: #fdf2f8; --girl-text: #a64d79; --danger: #c62828;
  --unpaid: #d00000;
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #16140f; --surface: #1f1d18; --surface2: #2a2820; --border: #353228; --text: #f0ede6; --text2: #a09d96; 
          --boy: #1a2a3a; --girl: #2d1b24; }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 0 16px 60px; }
h1, h2, h3 { font-family: 'DM Serif Display', serif; }
.app { max-width: 860px; margin: 0 auto; }
.save-controls { display: flex; gap: 10px; padding: 12px; background: #fff8e1; border: 2px solid #ffca28; border-radius: var(--radius); margin: 20px 0; align-items: center; }
header { padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.logo { display: flex; align-items: center; gap: 15px; min-width: 150px; }
.logo-icon { width: 55px; height: 55px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; cursor: pointer; overflow: hidden; border: 2px solid var(--border); flex-shrink: 0; }
.logo-icon img { width: 100%; height: 100%; object-fit: cover; }
.btn { padding: 6px 12px; font-size: 13px; font-weight: 500; border: 1px solid var(--border2); border-radius: 8px; cursor: pointer; background: var(--surface); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.lang-switcher { display: flex; border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; height: 31px; }
.lang-btn { padding: 0 10px; border: none; background: var(--surface); cursor: pointer; font-size: 12px; font-weight: bold; color: var(--text2); display: flex; align-items: center; }
.lang-btn.active { background: var(--accent); color: white; }
</style>
</head>
<body>
<div class="app">
  <div class="save-controls">
    <button class="btn btn-primary" onclick="exportData()">💾 Uložit na GitHub</button>
    <div class="lang-switcher">
        <button class="lang-btn active" id="btn-cz" onclick="setLang('cz')">CZ</button>
        <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>
    </div>
  </div>
  <header>
    <div class="logo">
        <h1>Evidence chovu</h1>
    </div>
  </header>
  <div id="content">
      </div>
</div>

<script>
// --- TVOJE DATA (ZDE SE BUDOU AUTOMATICKY AKTUALIZOVAT) ---
let db = {
    lang: 'cz',
    dogs: [],
    puppies: []
};

// --- NASTAVENÍ GITHUB PRO: rocles-cz ---
const ghConfig = {
    owner: 'rocles-cz',
    repo: 'chov',
    path: 'index.html',
};

// --- FUNKCE PRO UKLÁDÁNÍ NA GITHUB ---
async function exportData() {
    let token = localStorage.getItem('gh_token');
    
    if (!token) {
        token = prompt("Vlož svůj GitHub Token (ten dlouhý kód ghp_...):");
        if (token) {
            localStorage.setItem('gh_token', token);
        } else {
            return;
        }
    }

    // Příprava obsahu k odeslání
    const currentDbString = JSON.stringify(db, null, 2);
    let htmlContent = document.documentElement.outerHTML;
    
    // Najdeme řádek s db a nahradíme ho aktuálními daty
    htmlContent = htmlContent.replace(/let db\s*=\s*\{[\s\S]*?\};/, `let db = ${currentDbString};`);
    // Přidáme doctype, který outerHTML občas vynechá
    htmlContent = "<!DOCTYPE html>\n" + htmlContent;

    try {
        // 1. Zjistíme verzi (SHA) souboru na GitHubu
        const getFileRes = await fetch(`https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${ghConfig.path}`, {
            headers: { 'Authorization': `token ${token}`, 'Cache-Control': 'no-cache' }
        });

        if (!getFileRes.ok) throw new Error("Soubor index.html nebyl na GitHubu nalezen.");
        const fileData = await getFileRes.json();

        // 2. Odešleme upravený soubor zpět
        const updateRes = await fetch(`https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${ghConfig.path}`, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${token}`,
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                message: "Aktualizace dat: " + new Date().toLocaleString(),
                content: btoa(unescape(encodeURIComponent(htmlContent))),
                sha: fileData.sha
            })
        });

        if (updateRes.ok) {
            alert("✅ Úspěšně uloženo na GitHub!");
        } else {
            const err = await updateRes.json();
            if (updateRes.status === 401) {
                localStorage.removeItem('gh_token');
                alert("❌ Chyba: Neplatný token. Zkus ho vložit znovu.");
            } else {
                alert("❌ Chyba: " + err.message);
            }
        }
    } catch (error) {
        alert("❌ Chyba spojení: " + error.message);
    }
}

// Základní funkce pro zobrazení (zde si doplň zbytek svého kódu pro renderování psů)
function render() {
    const cont = document.getElementById('content');
    if (db.dogs.length === 0) {
        cont.innerHTML = "<p>Zatím žádní psi. Přidejte prvního psa v editoru.</p>";
    }
}

function setLang(l) {
    db.lang = l;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + l).classList.add('active');
    render();
}

render();
</script>
</body>
</html>
